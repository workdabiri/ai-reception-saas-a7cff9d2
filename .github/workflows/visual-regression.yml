name: Visual Regression

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  snapshot-pills:
    name: Snapshot Pills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run markup snapshot
        run: bun run snapshot:pills

  snapshot-pixels:
    name: Snapshot Pixels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bunx playwright install chromium --with-deps
        timeout-minutes: 5

      - name: Run pixel snapshot
        run: bun run snapshot:pixels
        timeout-minutes: 2

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pixel-diffs
          path: tests/visual/__diffs__/
          retention-days: 5
